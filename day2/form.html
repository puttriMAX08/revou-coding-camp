<head>

</head>

                Terkait kamu
            </legend>

                <option>Merah</option>
                <option>Kuning</option>
                <option>Hijau</option>
            </optgroup>
            <optgroup label="Warna Lanjutan">
                <option>Biru</option>

        </fieldset>
        <br/>
        <button>Simpan</button>
