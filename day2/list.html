<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Lists</title>
    
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-violet-600 via-fuchsia-600 to-orange-500 flex items-center justify-center p-6 text-white font-sans antialiased">

    <div class="bg-white/10 backdrop-blur-lg border border-white/20 rounded-3xl p-8 shadow-2xl w-full max-w-md">
        
        <h2 class="text-2xl font-bold mb-4 drop-shadow-md">Unordered List (ul)</h2>
        <ul class="ml-2 space-y-2 text-lg">
            <li class="font-semibold text-xl mb-1">Buah</li>
            <li class="list-disc ml-6 marker:text-white/80">Mangga</li>
            <li class="list-disc ml-6 marker:text-white/80">Pisang</li>
            <li class="list-disc ml-6 marker:text-white/80">Jambu</li>
        </ul>

        <hr class="border-white/20 my-8"/>

        <h2 class="text-2xl font-bold mb-4 drop-shadow-md">Ordered List (ol)</h2>
        <ol class="list-decimal ml-6 space-y-3 text-lg marker:font-bold marker:text-white/80">
            <li>Buka Github.com</li>
            <li>Klik tombol plus di kanan atas</li>
            <li>Pilih New Repository</li>
            <li>Isi nama repository</li>
            <li>Hidupkan Add Readme</li>
            <li>Klik Create Repository</li>
        </ol>

    </div>

</body>
</html>
